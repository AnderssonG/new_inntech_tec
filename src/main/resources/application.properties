# Define el nombre interno de la aplicacion dentro del contexto de Spring Boot.
spring.application.name=tecnico

# Importa las variables del archivo .env para poder usar credenciales y configuraciones externas.
spring.config.import=optional:file:.env[.properties]

# Mantiene los nombres de tablas y columnas tal como fueron definidos en la base de datos.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Evita que Hibernate cree, modifique o elimine tablas automaticamente.
spring.jpa.hibernate.ddl-auto=none
# Cierra la sesion JPA al terminar cada request para evitar cargas tardias innecesarias.
spring.jpa.open-in-view=false
# Hace que JPA termine su inicializacion antes de cualquier proceso extra relacionado con la base.
spring.jpa.defer-datasource-initialization=false
# Evita mostrar en consola cada consulta SQL ejecutada por Hibernate.
spring.jpa.show-sql=false

# Toma desde .env la URL de conexion a la base de datos.
spring.datasource.url=${DB_URL}
# Toma desde .env el usuario de la base de datos.
spring.datasource.username=${DB_USERNAME}
# Toma desde .env la contrasena de la base de datos.
spring.datasource.password=${DB_PASSWORD}
# Define el driver JDBC que se usara para conectarse a MySQL.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Oculta el banner ASCII de Spring Boot al arrancar la aplicacion.
spring.main.banner-mode=off
# Desactiva el reinicio automatico de DevTools para que el arranque sea mas rapido y estable.
spring.devtools.restart.enabled=false
# Desactiva LiveReload.
spring.devtools.livereload.enabled=false

# Impide que Spring ejecute scripts SQL de inicializacion automaticamente al arrancar.
spring.sql.init.mode=never

# Define el nivel general de logs de la aplicacion.
logging.level.root=INFO
# Reduce el ruido de logs internos de Spring.
logging.level.org.springframework=WARN
# Reduce el ruido de logs relacionados con seguridad.
logging.level.org.springframework.security=WARN
# Reduce el ruido de logs generales de Hibernate.
logging.level.org.hibernate=WARN
# Apaga el log detallado de sentencias SQL generadas por Hibernate.
logging.level.org.hibernate.SQL=OFF
# Reduce el ruido de logs generado por Swagger y SpringDoc.
logging.level.org.springdoc=WARN
